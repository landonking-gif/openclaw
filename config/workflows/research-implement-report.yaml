name: research-implement-report
description: "Research a topic, implement improvements, and send a summary email"
version: "1.0"
steps:
  - id: research
    name: Research & Analysis
    assigned_to: gamma-manager
    description: "Research the topic thoroughly and produce findings"
    depends_on: []
    timeout_sec: 600

  - id: implement
    name: Implementation
    assigned_to: beta-manager
    description: "Implement changes based on research findings"
    depends_on: [research]
    timeout_sec: 900

  - id: report
    name: Write Summary Report
    assigned_to: alpha-manager
    description: "Draft summary email with results from research and implementation"
    depends_on: [research, implement]
    timeout_sec: 300
