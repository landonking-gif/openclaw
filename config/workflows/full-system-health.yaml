name: full-system-health
description: "Run a full system health check, fix issues, and notify owner"
version: "1.0"
steps:
  - id: audit
    name: System Audit
    assigned_to: gamma-manager
    description: "Audit all services and agents for health issues"
    depends_on: []
    timeout_sec: 300

  - id: fix
    name: Fix Issues
    assigned_to: beta-manager
    description: "Fix any issues found during the audit"
    depends_on: [audit]
    timeout_sec: 600

  - id: notify
    name: Send Health Report
    assigned_to: alpha-manager
    description: "Email the owner a health report summary"
    depends_on: [audit, fix]
    timeout_sec: 120
